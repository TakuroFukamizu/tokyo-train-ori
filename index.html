<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ori Viewer</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- UI overlay -->
    <div id="ui">
      <button id="btn-start">🎥 Start Face Tracking</button>
      <button id="btn-preview" title="Toggle camera preview">📷</button>
    </div>

    <!-- Camera preview (PiP) -->
    <div id="preview-container">
      <video id="face-video" playsinline muted></video>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
