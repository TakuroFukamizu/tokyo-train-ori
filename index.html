<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ori Viewer</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- UI overlay -->
    <div id="ui">
      <button id="btn-start">🎥 Start Face Tracking</button>
      <button id="btn-preview" title="Toggle camera preview">📷</button>
      <div id="time-controls">
        <span id="sim-time">00:00:00</span>
        <select id="speed-select" title="Simulation speed">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="5">5x</option>
          <option value="10">10x</option>
        </select>
        <span id="train-count"></span>
      </div>
      <div id="tab-info"></div>
    </div>

    <!-- Train tooltip -->
    <div id="train-tooltip"></div>

    <!-- Camera preview (PiP) -->
    <div id="preview-container">
      <video id="face-video" playsinline muted></video>
    </div>

    <!-- Delay control panel -->
    <div id="delay-panel">
      <button id="delay-panel-toggle">遅延</button>
      <div id="delay-panel-list"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
